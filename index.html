<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>

     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

      <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

     <script src="./earthquakes.js"></script>




</head>

<body>
    <table id="eqTable">
        <tr>
            <th>Location</th>
            <th>Date</th>
            <th>Magnitude</th>
        </tr>
    </table>

    <script>

    
        var myTable = document.getElementById("eqTable")

    function eqTable(feature){

        var myRow = document.createElement("tr")

        var myCell1 = document.createElement("td")  // Location
        var myCell2 = document.createElement("td")  // Date
        var myCell3 = document.createElement("td")  // Magnitude

        var location = feature.properties.place
        var magnitude = feature.properties.mag
        var date = new Date(feature.properties.time)

        myCell1.innerHTML = location
        myCell2.innerHTML = date.toLocaleDateString()
        myCell3.innerHTML = magnitude

        if (magnitude >= 4.5) {
            myRow.style.backgroundColor = "red"
        } 
        else if (magnitude >= 4.0) {
            myRow.style.backgroundColor = "orange"
        } 
        else if (magnitude >= 3.0) {
            myRow.style.backgroundColor = "yellow"
        } 
        else {
            myRow.style.backgroundColor = "lightgreen"
        }

        myRow.append(myCell1)
        myRow.append(myCell2)
        myRow.append(myCell3)

        myTable.append(myRow)
    }

    data.features.forEach(e => eqTable(e))
        
        
    </script>
</body>
