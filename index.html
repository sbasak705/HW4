<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquakes</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./earthquakes.js"></script>

<style>
    #mapid {
        height: 600px;
        width: 100%;
    }
    #controls {
        width: 80%;
        margin: auto;
        text-align: center;
    }
</style>
</head>

<body>

<h1 style="text-align:center;">Earthquakes</h1>
<div id="mapid"></div>
<div id="controls">
    <input type="range" min="1" value="1" id="myRange">
    <p id="demo"></p>
</div>

<script>



var map = L.map("mapid").setView([38.348082, -100.771618], 4.45);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map)

data.features.sort(function(a, b) {
    return a.properties.time - b.properties.time;
});

var earthquakeLayer = L.geoJSON(data.features[0], {
    pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng, {
            radius: feature.properties.mag * 2,
            fillOpacity: 0.6
        }).bindPopup(
            "Location: " + feature.properties.place +
            "<br>Date: " + new Date(feature.properties.time).toLocaleDateString() +
            "<br>Magnitude: " + feature.properties.mag
        );
    }
}).addTo(map);

var slider = document.getElementById("myRange");
var output = document.getElementById("demo");
slider.max = data.features.length;
output.innerHTML =
    new Date(data.features[0].properties.time)
    .toLocaleDateString();

slider.oninput = function() {
    var index = Number(this.value);
    output.innerHTML =
        new Date(data.features[index - 1].properties.time)
        .toLocaleDateString();

    map.removeLayer(earthquakeLayer);

    earthquakeLayer = L.geoJSON(
        data.features.slice(0, index),
        {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: feature.properties.mag * 2,
                    fillOpacity: 0.6
                }).bindPopup(
                    "Location: " + feature.properties.place +
                    "<br>Date: " + new Date(feature.properties.time).toLocaleDateString() +
                    "<br>Magnitude: " + feature.properties.mag
                );
            }
        }
    );

    map.addLayer(earthquakeLayer);
};

window.onload = function() {
    slider.value = 1;
};

</script>

</body>
</html>
