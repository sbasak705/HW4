<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Map</title>

     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

      <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

     <script src="./earthquakes.js"></script>




</head>
<body>

    <div id="mapid"></div>
    <style>
        #mapid{width:900px; height: 500px;}
    </style>

    <script>
        var map = L.map("mapid").setView([38.348082, -100.771618], 4.45);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map)
        

         //L.geoJSON(green_level_hs).addTo(map);;
         var HSicon = L.icon({
            iconUrl: "https://creazilla-store.fra1.digitaloceanspaces.com/icons/3219541/earthquake-icon-md.png", 
            iconSize: [25,25],
            popupAnchor: [0, 0]
        });

        var customPopup = "<h1>Hurricane Sergio</h1><img src='https://zoom.earth/assets/images/storms/2048/2018/sergio.jpg' width='100' height='100'><p>2018</p>";

        L.geoJSON(data, {
            pointToLayer: function(feature, latlng){
                return L.marker(latlng, {icon: HSicon});
            }
        }).bindPopup(customPopup).addTo(map);
    </script>
    
</body>
</html>
